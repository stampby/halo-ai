#!/usr/sbin/nft -f
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Allow established/related connections
        ct state established,related accept

        # Allow loopback (all services are on localhost)
        iif lo accept

        # Allow SSH (key-only) from LAN only
        ip saddr xxx.xxx.xxx.0/24 tcp dport 22 accept

        # Allow Caddy reverse proxy from LAN only
        ip saddr xxx.xxx.xxx.0/24 tcp dport 80 accept
        ip saddr xxx.xxx.xxx.0/24 tcp dport 443 accept
        ip saddr xxx.xxx.xxx.0/24 tcp dport 8443 accept

        # Allow WireGuard from anywhere (future VPN setup)
        udp dport 51820 accept

        # Allow ICMP (ping)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # Drop everything else
        counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
