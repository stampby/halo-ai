<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background: transparent with subtle dark circle -->
  <circle cx="40" cy="40" r="38" fill="#0d1117" opacity="0.7"/>
  <!-- Halo ring -->
  <circle cx="40" cy="32" r="18" fill="none" stroke="#c9a84c" stroke-width="2" stroke-dasharray="5 2.5" opacity="0.9"/>
  <!-- Server silhouette (compact) -->
  <rect x="30" y="30" width="20" height="26" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.9"/>
  <line x1="30" y1="37" x2="50" y2="37" stroke="#c9a84c" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="44" x2="50" y2="44" stroke="#c9a84c" stroke-width="1" opacity="0.7"/>
  <!-- LEDs -->
  <circle cx="34" cy="33.5" r="1.2" fill="#c9a84c"/>
  <circle cx="34" cy="40.5" r="1.2" fill="#c9a84c"/>
  <circle cx="34" cy="47.5" r="1.2" fill="#00ff88"/>
  <!-- Label -->
  <text x="40" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#c9a84c" font-weight="bold" opacity="0.9">halo</text>
</svg>
