<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <rect width="400" height="120" fill="#0d1117"/>
  <!-- Speed chevrons -->
  <g stroke="#00d4ff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="28,38 42,60 28,82"/>
    <polyline points="44,38 58,60 44,82"/>
  </g>
  <!-- HALO text - bold angular -->
  <text x="78" y="76" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="4">HALO</text>
  <!-- AI text - accent color -->
  <text x="290" y="76" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="52" fill="#00d4ff" letter-spacing="2">AI</text>
  <!-- Thin underline accent -->
  <line x1="78" y1="90" x2="350" y2="90" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <!-- Dot accents -->
  <circle cx="270" cy="60" r="2.5" fill="#00d4ff" opacity="0.6"/>
</svg>