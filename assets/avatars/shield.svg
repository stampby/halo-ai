<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="20" fill="#0d1117"/>
  <!-- Shield shape -->
  <path d="M64,22 L96,38 L96,62 Q96,86 64,100 Q32,86 32,62 L32,38 Z" fill="none" stroke="#78909c" stroke-width="2.5"/>
  <!-- Inner shield -->
  <path d="M64,32 L86,44 L86,60 Q86,78 64,90 Q42,78 42,60 L42,44 Z" fill="none" stroke="#78909c" stroke-width="1.5" opacity="0.4"/>
  <!-- Blocked attack indicators bouncing off -->
  <line x1="18" y1="36" x2="32" y2="44" stroke="#ff4444" stroke-width="1.5" opacity="0.5"/>
  <line x1="14" y1="52" x2="32" y2="56" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>
  <line x1="20" y1="68" x2="34" y2="64" stroke="#ff4444" stroke-width="1.5" opacity="0.3"/>
  <!-- X marks (blocked) -->
  <g transform="translate(22,38)" opacity="0.5">
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="#ff4444" stroke-width="1.5"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="#ff4444" stroke-width="1.5"/>
  </g>
  <!-- Checkmark in center -->
  <polyline points="54,60 62,70 78,48" fill="none" stroke="#78909c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="64" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#78909c" font-weight="bold">shield</text>
</svg>
