  <line x1="92" y1="65" x2="76" y2="78" stroke="#00bfa5" stroke-width="1.5" opacity="0.4"/>
  <line x1="92" y1="65" x2="100" y2="78" stroke="#00bfa5" stroke-width="1.5" opacity="0.4"/>
  <!-- WiFi signal arcs -->
  <path d="M54,28 Q64,20 74,28" fill="none" stroke="#00bfa5" stroke-width="1.5" opacity="0.3"/>
  <path d="M48,22 Q64,12 80,22" fill="none" stroke="#00bfa5" stroke-width="1.5" opacity="0.2"/>
  <!-- Label -->
  <text x="64" y="108" text-anchor="middle" font-family="monospace" font-size="10" fill="#00bfa5" font-weight="bold">net</text>
