<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="20" fill="#0d1117"/>
  <!-- Network topology nodes -->
  <circle cx="64" cy="40" r="6" fill="#00bfa5"/>
  <circle cx="36" cy="60" r="5" fill="#00bfa5" opacity="0.8"/>
  <circle cx="92" cy="60" r="5" fill="#00bfa5" opacity="0.8"/>
  <circle cx="28" cy="82" r="4" fill="#00bfa5" opacity="0.6"/>
  <circle cx="52" cy="82" r="4" fill="#00bfa5" opacity="0.6"/>
  <circle cx="76" cy="82" r="4" fill="#00bfa5" opacity="0.6"/>
  <circle cx="100" cy="82" r="4" fill="#00bfa5" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="64" y1="46" x2="36" y2="55" stroke="#00bfa5" stroke-width="1.5" opacity="0.6"/>
  <line x1="64" y1="46" x2="92" y2="55" stroke="#00bfa5" stroke-width="1.5" opacity="0.6"/>
  <line x1="36" y1="65" x2="28" y2="78" stroke="#00bfa5" stroke-width="1.5" opacity="0.4"/>
