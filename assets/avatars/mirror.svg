<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="20" fill="#0d1117"/>
  <!-- Magnifying glass -->
  <circle cx="56" cy="50" r="20" fill="none" stroke="#448aff" stroke-width="2.5"/>
  <line x1="70" y1="64" x2="90" y2="84" stroke="#448aff" stroke-width="3" stroke-linecap="round"/>
  <!-- Redacted text inside lens -->
  <rect x="42" y="42" width="18" height="2.5" rx="1" fill="#448aff" opacity="0.6"/>
  <rect x="42" y="48" width="24" height="2.5" rx="1" fill="#448aff" opacity="0.4"/>
  <rect x="42" y="54" width="14" height="2.5" rx="1" fill="#448aff" opacity="0.6"/>
  <!-- Reflection lines -->
  <path d="M40,38 Q44,34 48,38" fill="none" stroke="#448aff" stroke-width="1.5" opacity="0.3"/>
  <!-- PII indicators struck through -->
  <text x="28" y="92" font-family="monospace" font-size="8" fill="#448aff" opacity="0.3" text-decoration="line-through">name@</text>
  <text x="68" y="92" font-family="monospace" font-size="8" fill="#448aff" opacity="0.3" text-decoration="line-through">192.x</text>
  <!-- Label -->
  <text x="64" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#448aff" font-weight="bold">mirror</text>
</svg>
