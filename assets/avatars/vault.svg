  <line x1="74" y1="52" x2="70" y2="52" stroke="#ffd740" stroke-width="2"/>
  <line x1="64" y1="62" x2="64" y2="58" stroke="#ffd740" stroke-width="2"/>
  <line x1="54" y1="52" x2="58" y2="52" stroke="#ffd740" stroke-width="2"/>
