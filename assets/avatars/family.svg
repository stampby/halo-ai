<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" rx="16" fill="#0d1117"/>

  <!-- ═══ ROW 1: Core Family ═══ -->
  <!-- Bounty -->
  <text x="180" y="55" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e040fb">bounty</text>
  <text x="180" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">bug hunter</text>

  <line x1="230" y1="50" x2="330" y2="50" stroke="#30363d" stroke-width="1"/>

  <!-- Halo -->
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#00d4ff">halo</text>
  <text x="400" y="52" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">orchestrator</text>

  <line x1="470" y1="42" x2="570" y2="42" stroke="#30363d" stroke-width="1"/>

  <!-- Echo -->
  <text x="640" y="45" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ce93d8">echo</text>
  <text x="640" y="60" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">social media</text>

  <!-- Connector down from halo -->
  <line x1="400" y1="60" x2="400" y2="95" stroke="#30363d" stroke-width="1"/>

  <!-- ═══ ROW 2: The Brothers ═══ -->
  <line x1="300" y1="95" x2="500" y2="95" stroke="#30363d" stroke-width="1"/>

  <!-- Amp -->
  <line x1="300" y1="95" x2="300" y2="110" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="128" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ff6f00">amp</text>
  <text x="300" y="143" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">audio engineer</text>

  <!-- Meek -->
  <line x1="500" y1="95" x2="500" y2="110" stroke="#30363d" stroke-width="1"/>
  <text x="500" y="128" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff">meek</text>
  <text x="500" y="143" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">security chief</text>

  <!-- Connector down from meek to reflex box -->
  <line x1="500" y1="150" x2="500" y2="180" stroke="#30363d" stroke-width="1"/>

  <!-- ═══ REFLEX GROUP — boxed platoon ═══ -->
  <rect x="40" y="180" width="820" height="240" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="450" y="205" text-anchor="middle" font-family="monospace" font-size="10" fill="#30363d" letter-spacing="3">REFLEX GROUP</text>

  <!-- Row 1: 5 agents -->
  <g>
    <!-- Pulse -->
    <rect x="70" y="220" width="130" height="56" rx="6" fill="#161b22" stroke="#00ff88" stroke-width="1"/>
    <circle cx="88" cy="248" r="4" fill="#00ff88"/>
    <text x="105" y="244" font-family="monospace" font-size="10" font-weight="bold" fill="#00ff88">pulse</text>
    <text x="105" y="260" font-family="monospace" font-size="8" fill="#555">health</text>

    <!-- Ghost -->
    <rect x="220" y="220" width="130" height="56" rx="6" fill="#161b22" stroke="#b388ff" stroke-width="1"/>
    <circle cx="238" cy="248" r="4" fill="#b388ff"/>
    <text x="255" y="244" font-family="monospace" font-size="10" font-weight="bold" fill="#b388ff">ghost</text>
    <text x="255" y="260" font-family="monospace" font-size="8" fill="#555">secrets</text>

    <!-- Gate -->
    <rect x="370" y="220" width="130" height="56" rx="6" fill="#161b22" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="388" cy="248" r="4" fill="#00d4ff"/>
    <text x="405" y="244" font-family="monospace" font-size="10" font-weight="bold" fill="#00d4ff">gate</text>
    <text x="405" y="260" font-family="monospace" font-size="8" fill="#555">firewall</text>

    <!-- Shadow -->
    <rect x="520" y="220" width="130" height="56" rx="6" fill="#161b22" stroke="#ff9800" stroke-width="1"/>
    <circle cx="538" cy="248" r="4" fill="#ff9800"/>
    <text x="555" y="244" font-family="monospace" font-size="10" font-weight="bold" fill="#ff9800">shadow</text>
    <text x="555" y="260" font-family="monospace" font-size="8" fill="#555">integrity</text>

    <!-- Fang -->
    <rect x="670" y="220" width="130" height="56" rx="6" fill="#161b22" stroke="#ff4444" stroke-width="1"/>
    <circle cx="688" cy="248" r="4" fill="#ff4444"/>
    <text x="705" y="244" font-family="monospace" font-size="10" font-weight="bold" fill="#ff4444">fang</text>
    <text x="705" y="260" font-family="monospace" font-size="8" fill="#555">intrusion</text>
  </g>

  <!-- Row 2: 4 agents -->
  <g>
    <!-- Mirror -->
    <rect x="145" y="296" width="130" height="56" rx="6" fill="#161b22" stroke="#448aff" stroke-width="1"/>
    <circle cx="163" cy="324" r="4" fill="#448aff"/>
    <text x="180" y="320" font-family="monospace" font-size="10" font-weight="bold" fill="#448aff">mirror</text>
    <text x="180" y="336" font-family="monospace" font-size="8" fill="#555">pii scan</text>

    <!-- Vault -->
    <rect x="295" y="296" width="130" height="56" rx="6" fill="#161b22" stroke="#ffd740" stroke-width="1"/>
    <circle cx="313" cy="324" r="4" fill="#ffd740"/>
    <text x="330" y="320" font-family="monospace" font-size="10" font-weight="bold" fill="#ffd740">vault</text>
    <text x="330" y="336" font-family="monospace" font-size="8" fill="#555">backup</text>

    <!-- Net -->
    <rect x="445" y="296" width="130" height="56" rx="6" fill="#161b22" stroke="#00bfa5" stroke-width="1"/>
    <circle cx="463" cy="324" r="4" fill="#00bfa5"/>
    <text x="480" y="320" font-family="monospace" font-size="10" font-weight="bold" fill="#00bfa5">net</text>
    <text x="480" y="336" font-family="monospace" font-size="8" fill="#555">network</text>

    <!-- Shield -->
    <rect x="595" y="296" width="130" height="56" rx="6" fill="#161b22" stroke="#78909c" stroke-width="1"/>
    <circle cx="613" cy="324" r="4" fill="#78909c"/>
    <text x="630" y="320" font-family="monospace" font-size="10" font-weight="bold" fill="#78909c">shield</text>
    <text x="630" y="336" font-family="monospace" font-size="8" fill="#555">protection</text>
  </g>

  <!-- ═══ ROW 3: Other agents ═══ -->
  <g>
    <rect x="70" y="440" width="130" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="135" y="464" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#4fc3f7">sentinel</text>
    <text x="135" y="478" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">code watcher</text>

    <rect x="220" y="440" width="130" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="285" y="464" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#aed581">mechanic</text>
    <text x="285" y="478" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">bug fixer</text>

    <rect x="370" y="440" width="130" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="435" y="464" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#ffab40">crypto</text>
    <text x="435" y="478" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">arbitrage</text>

    <rect x="520" y="440" width="130" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="585" y="464" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#e6ee9c">conductor</text>
    <text x="585" y="478" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">ai composer</text>

    <rect x="670" y="440" width="130" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="735" y="464" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#ef5350">forge</text>
    <text x="735" y="478" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">game builder</text>
  </g>

  <!-- Footer -->
  <text x="450" y="510" text-anchor="middle" font-family="monospace" font-size="9" fill="#30363d" letter-spacing="2">the halo-ai family &middot; designed and built by the architect</text>
</svg>
