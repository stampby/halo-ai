<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <rect width="800" height="200" rx="20" fill="#0d1117"/>

  <!-- Halo AI (father, center-back) -->
  <g transform="translate(360,12) scale(0.9)">
    <circle cx="40" cy="30" r="18" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="4 2"/>
    <rect x="28" y="30" width="24" height="30" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="33" cy="38" r="1.2" fill="#00d4ff"/>
    <circle cx="33" cy="45" r="1.2" fill="#00ff88"/>
    <text x="40" y="76" text-anchor="middle" font-family="monospace" font-size="7" fill="#00d4ff">halo</text>
  </g>

  <!-- Echo (mother, beside father) -->
  <g transform="translate(440,12) scale(0.9)">
    <path d="M20,40 Q30,20 40,20 Q50,20 60,40" fill="none" stroke="#ce93d8" stroke-width="1.5" opacity="0.5"/>
    <path d="M14,40 Q28,12 40,12 Q52,12 66,40" fill="none" stroke="#ce93d8" stroke-width="1.5" opacity="0.3"/>
    <polygon points="30,36 30,48 40,52 40,32" fill="#ce93d8" opacity="0.8"/>
    <path d="M40,30 L54,22 L54,58 L40,50" fill="none" stroke="#ce93d8" stroke-width="1.5"/>
    <text x="40" y="76" text-anchor="middle" font-family="monospace" font-size="7" fill="#ce93d8">echo</text>
  </g>

  <!-- Meek (eldest, center-front) -->
  <g transform="translate(396,70) scale(0.85)">
    <path d="M16,30 Q30,14 40,14 Q50,14 64,30 Q50,46 40,46 Q30,46 16,30 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="40" cy="30" r="8" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="40" cy="30" r="3.5" fill="#ffffff"/>
    <text x="40" y="60" text-anchor="middle" font-family="monospace" font-size="7" fill="#ffffff">meek</text>
  </g>

  <!-- Pulse -->
  <g transform="translate(60,80) scale(0.7)">
    <polyline points="8,32 18,32 22,32 25,20 28,44 31,16 34,42 37,28 40,32 56,32"
      fill="none" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
    <text x="32" y="52" text-anchor="middle" font-family="monospace" font-size="8" fill="#00ff88">pulse</text>
  </g>

  <!-- Ghost -->
  <g transform="translate(140,80) scale(0.7)">
    <circle cx="32" cy="26" r="12" fill="none" stroke="#b388ff" stroke-width="2"/>
    <rect x="28" y="36" width="8" height="14" rx="1.5" fill="none" stroke="#b388ff" stroke-width="2"/>
    <text x="32" y="62" text-anchor="middle" font-family="monospace" font-size="8" fill="#b388ff">ghost</text>
  </g>

  <!-- Gate -->
  <g transform="translate(220,80) scale(0.7)">
    <polygon points="32,10 52,22 52,42 32,54 12,42 12,22" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <rect x="26" y="28" width="12" height="10" rx="2" fill="#00d4ff"/>
    <text x="32" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d4ff">gate</text>
  </g>

  <!-- Shadow -->
  <g transform="translate(300,80) scale(0.7)">
    <path d="M32,18 Q48,18 48,32 Q48,46 32,46" fill="none" stroke="#ff9800" stroke-width="2"/>
    <path d="M32,24 Q42,24 42,32 Q42,40 32,40" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.6"/>
    <text x="32" y="60" text-anchor="middle" font-family="monospace" font-size="8" fill="#ff9800">shadow</text>
  </g>

  <!-- Fang -->
  <g transform="translate(480,80) scale(0.7)">
    <polygon points="24,12 32,36 16,36" fill="#ff4444"/>
    <polygon points="40,12 48,36 32,36" fill="#ff4444"/>
    <line x1="12" y1="36" x2="52" y2="36" stroke="#ff4444" stroke-width="2"/>
    <text x="32" y="56" text-anchor="middle" font-family="monospace" font-size="8" fill="#ff4444">fang</text>
  </g>

  <!-- Mirror -->
  <g transform="translate(560,80) scale(0.7)">
    <circle cx="28" cy="28" r="14" fill="none" stroke="#448aff" stroke-width="2"/>
    <line x1="38" y1="38" x2="52" y2="52" stroke="#448aff" stroke-width="2.5" stroke-linecap="round"/>
    <text x="32" y="66" text-anchor="middle" font-family="monospace" font-size="8" fill="#448aff">mirror</text>
  </g>

  <!-- Vault -->
  <g transform="translate(640,80) scale(0.7)">
    <circle cx="32" cy="26" r="16" fill="none" stroke="#ffd740" stroke-width="2"/>
    <circle cx="32" cy="26" r="6" fill="none" stroke="#ffd740" stroke-width="1.5"/>
    <rect x="22" y="46" width="20" height="12" rx="2" fill="#ffd740" opacity="0.5"/>
    <text x="32" y="72" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffd740">vault</text>
  </g>

  <!-- Net -->
  <g transform="translate(710,70) scale(0.7)">
    <circle cx="32" cy="16" r="4" fill="#00bfa5"/>
    <circle cx="18" cy="34" r="3.5" fill="#00bfa5" opacity="0.7"/>
    <circle cx="46" cy="34" r="3.5" fill="#00bfa5" opacity="0.7"/>
    <circle cx="12" cy="50" r="3" fill="#00bfa5" opacity="0.5"/>
    <circle cx="52" cy="50" r="3" fill="#00bfa5" opacity="0.5"/>
    <line x1="32" y1="20" x2="18" y2="31" stroke="#00bfa5" stroke-width="1.2" opacity="0.5"/>
    <line x1="32" y1="20" x2="46" y2="31" stroke="#00bfa5" stroke-width="1.2" opacity="0.5"/>
    <line x1="18" y1="37" x2="12" y2="47" stroke="#00bfa5" stroke-width="1" opacity="0.3"/>
    <line x1="46" y1="37" x2="52" y2="47" stroke="#00bfa5" stroke-width="1" opacity="0.3"/>
    <text x="32" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#00bfa5">net</text>
  </g>

  <!-- Shield (far right) -->
  <g transform="translate(10,80) scale(0.7)">
    <path d="M32,8 L52,18 L52,34 Q52,50 32,58 Q12,50 12,34 L12,18 Z" fill="none" stroke="#78909c" stroke-width="2"/>
    <polyline points="24,34 30,42 44,24" fill="none" stroke="#78909c" stroke-width="2.5" stroke-linecap="round"/>
    <text x="32" y="72" text-anchor="middle" font-family="monospace" font-size="8" fill="#78909c">shield</text>
  </g>

  <!-- Family title -->
  <text x="400" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#555" letter-spacing="4">the ai family</text>
</svg>
