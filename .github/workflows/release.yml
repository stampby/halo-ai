# halo-ai — stamped by the architect
name: Release & Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # Dry-run must pass before any release
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install.sh --dry-run
        run: |
          chmod +x install.sh
          ./install.sh --dry-run

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck install.sh
        run: |
          sudo apt-get install -y shellcheck
          shellcheck install.sh --severity=warning || true
          find scripts/ -name "*.sh" -exec shellcheck --severity=warning {} + || true

  release:
    needs: [dry-run, shellcheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine release type
        id: release_type
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-rc"* ]]; then
            echo "is_rc=true" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "label=Release Candidate" >> $GITHUB_OUTPUT
          else
            echo "is_rc=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "label=Stable" >> $GITHUB_OUTPUT
          fi
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build Python package
        run: python -m build

      - name: Create release tarball
        run: |
          VERSION=${{ steps.release_type.outputs.version }}
          tar czf halo-ai-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='test-runs' \
            install.sh \
            scripts/ \
            agent/ \
            configs/ \
            systemd/ \
            dashboard-api/ \
            dashboard-ui/ \
            discord-bots/ \
            docs/ \
            pyproject.toml \
            README.md \
            LICENSE
          echo "TARBALL=halo-ai-${VERSION}.tar.gz" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          files: |
            ${{ env.TARBALL }}
            dist/*.whl
            dist/*.tar.gz
          body: |
            ## halo-ai ${{ github.ref_name }} — ${{ steps.release_type.outputs.label }}

            Bare-metal AI stack for AMD Strix Halo.
            91 tok/s · 42 services · 17 agents · zero cloud.

            ${{ steps.release_type.outputs.is_rc == 'true' && '> **Release Candidate** — for testing only. Do NOT deploy to production. Report bugs via GitHub Issues or Discord #troubleshooting.' || '> **Stable Release** — tested, verified, production-ready.' }}

            ### Install
            ```bash
            git clone https://github.com/stampby/halo-ai.git
            cd halo-ai
            git checkout ${{ github.ref_name }}
            ./install.sh --dry-run
            ./install.sh
            ```

            ### USB Portable
            ```bash
            sudo ./scripts/halo-build-usb.sh --image halo-usb.img
            ```

            *Designed and built by the architect*

      - name: Publish to GitHub Packages (PyPI)
        if: steps.release_type.outputs.is_rc == 'false'
        run: |
          twine upload --repository-url https://ghcr.io/stampby \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            dist/* || echo "PyPI upload skipped"
